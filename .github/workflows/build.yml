name: Build

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['main']

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install dependencies
        run: bun i

      - name: Create blank .env.local file
        run: touch apps/site/.env.local

      - name: Build workspaces
        run: bun run build

      - name: Build Storybook
        run: bun run build-storybook

      - name: Upload Next.js build artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nextjs-build
          path: |
            apps/site/.next/
            !apps/site/.next/cache
          retention-days: 7

      - name: Upload Storybook build artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: storybook-build
          path: apps/site/storybook-static/
          retention-days: 7
